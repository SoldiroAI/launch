<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soldiro AI — Inbox</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700;800;900&family=Sora:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #07070a;
      --surface:   #0d0d16;
      --surface2:  #111119;
      --surface3:  #181825;
      --surface4:  #1e1e2e;
      --border:    #1e1e2e;
      --border2:   #2a2a3a;
      --border3:   #38384e;
      --gold:      #e8b84b;
      --gold2:     #c49030;
      --gold3:     #f5d07a;
      --goldfade:  rgba(232,184,75,0.07);
      --goldring:  rgba(232,184,75,0.18);
      --red:       #e84b6a;
      --redfade:   rgba(232,75,106,0.08);
      --green:     #2ecc8a;
      --greenfade: rgba(46,204,138,0.08);
      --blue:      #4a8fff;
      --bluefade:  rgba(74,143,255,0.08);
      --amber:     #ffb347;
      --amberfade: rgba(255,179,71,0.08);
      --purple:    #9b6dff;
      --text:      #eae6f5;
      --text2:     #a9a1c2;
      --text3:     #6a6380;
      --muted:     #43405c;
      --font-d:    'Barlow Condensed', sans-serif;
      --font-b:    'Sora', sans-serif;
      --font-m:    'JetBrains Mono', monospace;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-b);
      font-size: 14px;
      line-height: 1.5;
    }

    /* ══ SHELL: topnav + three-column inbox ══ */
    .shell {
      display: grid;
      grid-template-rows: 52px 1fr;
      height: 100vh;
    }

    /* ══ TOPNAV ══ */
    .topnav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      z-index: 20;
      flex-shrink: 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-mark {
      background: var(--gold);
      color: var(--bg);
      font-family: var(--font-d);
      font-weight: 800;
      font-size: 14px;
      width: 26px; height: 26px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 5px;
    }

    .brand-name {
      font-family: var(--font-d);
      font-size: 16px;
      font-weight: 700;
    }

    .topnav-center {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .topnav-tab {
      padding: 6px 14px;
      font-family: var(--font-m);
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text3);
      background: transparent;
      border: 1px solid transparent;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .topnav-tab:hover { color: var(--text2); border-color: var(--border2); }
    .topnav-tab.active { color: var(--gold); border-color: var(--goldring); background: var(--goldfade); }
    .topnav-tab:focus-visible { outline: 2px solid var(--gold2); outline-offset: 2px; }

    .topnav-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .unread-pill {
      background: var(--red);
      color: #fff;
      font-family: var(--font-m);
      font-size: 10px;
      padding: 3px 8px;
      border-radius: 20px;
      animation: pulse-badge 2s ease-in-out infinite;
    }

    @keyframes pulse-badge {
      0%,100% { box-shadow: 0 0 0 0 rgba(232,75,106,0.4); }
      50%      { box-shadow: 0 0 0 5px rgba(232,75,106,0); }
    }

    .agent-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: var(--font-m);
      font-size: 10px;
      color: var(--green);
      letter-spacing: 0.5px;
    }

    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green);
      animation: breathe 2s ease-in-out infinite;
    }

    @keyframes breathe {
      0%,100% { box-shadow: 0 0 0 0 rgba(46,204,138,0.5); }
      50%      { box-shadow: 0 0 0 4px rgba(46,204,138,0); }
    }

    /* ══ THREE-PANEL LAYOUT ══ */
    .inbox {
      display: grid;
      grid-template-columns: 220px 300px 1fr;
      overflow: hidden;
      height: 100%;
    }

    /* ══ COL 1: FILTER SIDEBAR ══ */
    .filter-col {
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    .filter-header {
      padding: 16px 16px 10px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .filter-title {
      font-family: var(--font-d);
      font-size: 20px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: 0.3px;
    }

    .filter-sub {
      font-family: var(--font-m);
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--text3);
      margin-top: 3px;
    }

    .filter-search {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .search-input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    .search-icon {
      position: absolute;
      left: 9px;
      color: var(--text3);
      font-size: 12px;
      pointer-events: none;
    }

    .search-input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border2);
      border-radius: 6px;
      padding: 7px 10px 7px 28px;
      color: var(--text);
      font-family: var(--font-b);
      font-size: 12px;
      outline: none;
      transition: border-color 0.15s;
    }

    .search-input:focus { border-color: var(--gold2); }
    .search-input::placeholder { color: var(--muted); }

    .filter-section { padding: 10px 0 4px; }

    .filter-label {
      font-family: var(--font-m);
      font-size: 9px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--text3);
      padding: 0 16px 6px;
    }

    .filter-btn {
      display: flex;
      align-items: center;
      gap: 9px;
      width: 100%;
      padding: 8px 16px;
      background: transparent;
      border: none;
      border-left: 3px solid transparent;
      font-family: var(--font-b);
      font-size: 12px;
      color: var(--text2);
      cursor: pointer;
      text-align: left;
      transition: all 0.15s;
    }

    .filter-btn:hover { background: var(--goldfade); color: var(--text); }
    .filter-btn.active { background: var(--goldfade); color: var(--gold); border-left-color: var(--gold); }
    .filter-btn:focus-visible { outline: 2px solid var(--gold2); outline-offset: -2px; }

    .fb-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot-hot    { background: var(--red); box-shadow: 0 0 0 2px rgba(232,75,106,0.2); }
    .dot-warm   { background: var(--amber); }
    .dot-new    { background: var(--blue); }
    .dot-qual   { background: var(--green); }
    .dot-all    { background: var(--muted); }

    .fb-count {
      margin-left: auto;
      font-family: var(--font-m);
      font-size: 10px;
      color: var(--text3);
    }

    .filter-btn.active .fb-count { color: var(--gold2); }

    .filter-divider { height: 1px; background: var(--border); margin: 8px 16px; }

    /* Campaign filter pills */
    .campaign-filter {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      padding: 0 16px 8px;
    }

    .cf-pill {
      font-family: var(--font-m);
      font-size: 9px;
      padding: 3px 8px;
      border-radius: 4px;
      cursor: pointer;
      border: 1px solid var(--border2);
      background: transparent;
      color: var(--text3);
      transition: all 0.12s;
      letter-spacing: 0.3px;
    }

    .cf-pill:hover { border-color: var(--gold2); color: var(--text2); }
    .cf-pill.active { border-color: var(--goldring); background: var(--goldfade); color: var(--gold); }

    /* ══ COL 2: CONVERSATION LIST ══ */
    .conv-col {
      background: var(--surface2);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .conv-col-header {
      padding: 12px 14px 10px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .conv-col-title {
      font-family: var(--font-m);
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text3);
    }

    .conv-sort {
      display: flex;
      align-items: center;
      gap: 4px;
      font-family: var(--font-m);
      font-size: 9px;
      color: var(--text3);
      cursor: pointer;
      background: transparent;
      border: none;
      padding: 3px 6px;
      border-radius: 4px;
      transition: all 0.12s;
    }

    .conv-sort:hover { color: var(--text2); background: var(--border); }

    .conv-list {
      flex: 1;
      overflow-y: auto;
    }

    /* Conversation card */
    .conv-card {
      padding: 13px 14px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.12s;
      position: relative;
      width: 100%;
      background: transparent;
      border-top: none; border-left: none; border-right: none;
      text-align: left;
      font-family: var(--font-b);
      color: inherit;
      display: block;
    }

    .conv-card:hover { background: var(--goldfade); }
    .conv-card.active { background: var(--goldfade); border-left: 3px solid var(--gold); padding-left: 11px; }
    .conv-card:focus-visible { outline: 2px solid var(--gold2); outline-offset: -2px; }

    /* Unread indicator */
    .conv-card.unread::before {
      content: '';
      position: absolute;
      left: 5px; top: 50%;
      transform: translateY(-50%);
      width: 4px; height: 4px;
      border-radius: 50%;
      background: var(--gold);
    }

    .conv-card.active::before { display: none; }

    .conv-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px;
    }

    .conv-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 160px;
    }

    .conv-time {
      font-family: var(--font-m);
      font-size: 9px;
      color: var(--text3);
      flex-shrink: 0;
      margin-left: 6px;
    }

    .conv-company {
      font-size: 11px;
      color: var(--text2);
      margin-bottom: 5px;
    }

    .conv-preview {
      font-size: 11px;
      color: var(--text3);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.4;
      margin-bottom: 6px;
    }

    .conv-badges {
      display: flex;
      align-items: center;
      gap: 5px;
      flex-wrap: wrap;
    }

    .badge-pill {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      font-family: var(--font-m);
      font-size: 8px;
      letter-spacing: 0.5px;
      padding: 2px 6px;
      border-radius: 3px;
      border: 1px solid;
      white-space: nowrap;
    }

    .pill-hot  { background: var(--redfade);   color: var(--red);   border-color: rgba(232,75,106,0.25); }
    .pill-warm { background: var(--amberfade); color: var(--amber); border-color: rgba(255,179,71,0.25); }
    .pill-new  { background: var(--bluefade);  color: var(--blue);  border-color: rgba(74,143,255,0.25); }
    .pill-qual { background: var(--greenfade); color: var(--green); border-color: rgba(46,204,138,0.25); }

    .pill-sent { background: rgba(155,109,255,0.08); color: var(--purple); border-color: rgba(155,109,255,0.2); }
    .pill-open { background: var(--bluefade); color: var(--blue); border-color: rgba(74,143,255,0.2); }

    /* Sentiment mini-bar */
    .sentiment-bar {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-top: 4px;
    }

    .sent-label {
      font-family: var(--font-m);
      font-size: 8px;
      color: var(--text3);
      letter-spacing: 0.5px;
    }

    .sent-dots {
      display: flex;
      gap: 2px;
    }

    .sent-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--border2);
    }

    .sent-dot.filled.pos { background: var(--green); }
    .sent-dot.filled.neg { background: var(--red); }
    .sent-dot.filled.neu { background: var(--amber); }

    /* BANT mini-badge on card */
    .bant-mini {
      font-family: var(--font-m);
      font-size: 8px;
      letter-spacing: 0.5px;
    }

    /* ══ COL 3: DETAIL PANE ══ */
    .detail-col {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg);
    }

    .detail-header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .detail-person {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .avatar {
      width: 38px; height: 38px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-d);
      font-size: 16px;
      font-weight: 800;
      flex-shrink: 0;
    }

    .detail-name {
      font-family: var(--font-d);
      font-size: 20px;
      font-weight: 800;
      letter-spacing: 0.3px;
    }

    .detail-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 2px;
    }

    .detail-company {
      font-family: var(--font-m);
      font-size: 11px;
      color: var(--text2);
    }

    .detail-title {
      font-family: var(--font-b);
      font-size: 11px;
      color: var(--text3);
    }

    .detail-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .action-btn {
      padding: 7px 14px;
      font-family: var(--font-m);
      font-size: 10px;
      letter-spacing: 0.5px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 6px;
      text-transform: uppercase;
    }

    .action-btn.ghost {
      background: transparent;
      border: 1px solid var(--border2);
      color: var(--text2);
    }

    .action-btn.ghost:hover { border-color: var(--gold2); color: var(--gold); }

    .action-btn.gold {
      background: var(--gold);
      border: none;
      color: var(--bg);
      font-weight: 500;
    }

    .action-btn.gold:hover { background: var(--gold3); transform: translateY(-1px); box-shadow: 0 4px 14px rgba(232,184,75,0.25); }
    .action-btn.gold:active { transform: translateY(0); }
    .action-btn:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }

    /* Thread area + right sidebar together */
    .detail-body {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 320px;
      overflow: hidden;
    }

    /* ── THREAD ── */
    .thread-area {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border-right: 1px solid var(--border);
    }

    .thread-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .msg-wrap {
      display: flex;
      gap: 10px;
      animation: msgIn 0.25s ease both;
    }

    @keyframes msgIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg-wrap.outbound { flex-direction: row-reverse; }

    .msg-avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      font-family: var(--font-d);
      font-size: 11px;
      font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .msg-bubble {
      max-width: 75%;
      background: var(--surface3);
      border: 1px solid var(--border2);
      border-radius: 10px 10px 10px 2px;
      padding: 12px 14px;
      font-size: 13px;
      line-height: 1.65;
      color: var(--text);
    }

    .msg-wrap.outbound .msg-bubble {
      background: var(--surface4);
      border-color: var(--border2);
      border-radius: 10px 10px 2px 10px;
      color: var(--text2);
    }

    .msg-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 5px;
    }

    .msg-name {
      font-family: var(--font-m);
      font-size: 10px;
      letter-spacing: 1px;
      color: var(--text3);
      text-transform: uppercase;
    }

    .msg-time {
      font-family: var(--font-m);
      font-size: 9px;
      color: var(--muted);
    }

    .msg-ai-tag {
      font-family: var(--font-m);
      font-size: 8px;
      padding: 1px 5px;
      border-radius: 3px;
      background: var(--goldfade);
      border: 1px solid var(--goldring);
      color: var(--gold2);
      letter-spacing: 0.5px;
    }

    .msg-sent-status {
      font-family: var(--font-m);
      font-size: 9px;
      color: var(--text3);
      margin-top: 4px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* ── REPLY COMPOSER ── */
    .composer {
      border-top: 1px solid var(--border);
      padding: 14px 20px;
      background: var(--surface);
      flex-shrink: 0;
    }

    .composer-tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 10px;
    }

    .comp-tab {
      padding: 4px 10px;
      font-family: var(--font-m);
      font-size: 9px;
      letter-spacing: 1px;
      text-transform: uppercase;
      background: transparent;
      border: 1px solid var(--border2);
      border-radius: 4px;
      color: var(--text3);
      cursor: pointer;
      transition: all 0.12s;
    }

    .comp-tab.active { background: var(--goldfade); border-color: var(--goldring); color: var(--gold); }
    .comp-tab:hover { color: var(--text2); border-color: var(--border3); }
    .comp-tab:focus-visible { outline: 2px solid var(--gold2); }

    .composer-input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border2);
      border-radius: 8px;
      padding: 11px 13px;
      color: var(--text);
      font-family: var(--font-b);
      font-size: 13px;
      line-height: 1.6;
      resize: none;
      outline: none;
      min-height: 80px;
      max-height: 180px;
      transition: border-color 0.15s;
      overflow-y: auto;
    }

    .composer-input:focus { border-color: var(--gold2); box-shadow: 0 0 0 3px rgba(232,184,75,0.06); }
    .composer-input::placeholder { color: var(--muted); }

    .composer-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 10px;
    }

    .composer-left {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .comp-ic-btn {
      width: 30px; height: 30px;
      background: transparent;
      border: 1px solid var(--border2);
      border-radius: 5px;
      color: var(--text3);
      cursor: pointer;
      font-size: 13px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.12s;
    }

    .comp-ic-btn:hover { border-color: var(--gold2); color: var(--gold); }

    .char-count {
      font-family: var(--font-m);
      font-size: 10px;
      color: var(--muted);
    }

    .send-btn {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 8px 20px;
      background: var(--gold);
      border: none;
      border-radius: 6px;
      color: var(--bg);
      font-family: var(--font-m);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.15s;
    }

    .send-btn:hover { background: var(--gold3); transform: translateY(-1px); box-shadow: 0 4px 14px rgba(232,184,75,0.2); }
    .send-btn:active { transform: translateY(0); }
    .send-btn:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }

    .send-btn.sending { opacity: 0.6; pointer-events: none; }

    /* ── RIGHT SIDEBAR ── */
    .right-sidebar {
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      background: var(--surface);
      gap: 0;
    }

    .rs-section {
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .rs-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 13px 16px 11px;
      cursor: pointer;
      user-select: none;
    }

    .rs-title {
      display: flex;
      align-items: center;
      gap: 7px;
      font-family: var(--font-m);
      font-size: 10px;

      gap: 10px;

      border-radius: 4px;
      background: var(--surface3);
      border: 1px solid var(--border2);

      font-size: 10px;
      font-weight: 500;
      color: var(--text3);
      flex-shrink: 0;
      transition: all 0.2s;

      background: var(--greenfade);
      border-color: rgba(46,204,138,0.3);
      color: var(--green);
    }

      background: var(--redfade);
      border-color: rgba(232,75,106,0.2);
      color: var(--red);
    }

    .bant-row.partial .bant-letter {
      background: var(--amberfade);
      border-color: rgba(255,179,71,0.2);
      color: var(--amber);
    }

    .bant-label {
      font-size: 11px;
      color: var(--text2);
      flex: 1;
    }

    .bant-status {
      font-family: var(--font-m);
      font-size: 9px;
      letter-spacing: 0.3px;
    }

    .bant-row.confirmed .bant-status { color: var(--green); }
    .bant-row.unconfirmed .bant-status { color: var(--red); }
    .bant-row.partial .bant-status { color: var(--amber); }

      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .bant-score-label {
      font-family: var(--font-m);
      font-size: 10px;
      color: var(--text3);
      letter-spacing: 0.5px;
    }

    .bant-score-val {
      font-family: var(--font-d);
      font-size: 22px;
      font-weight: 800;
    }

    .bant-score-tag {
      font-family: var(--font-m);
      font-size: 9px;
      padding: 2px 8px;
      border-radius: 3px;
      letter-spacing: 1px;

      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 12px;

      align-items: center;
      gap: 6px;
      font-family: var(--font-m);
      font-size: 9px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--gold2);
    }

    .ai-regen {
      padding: 3px 8px;
      background: transparent;
      border: 1px solid var(--goldring);
      border-radius: 4px;
      color: var(--gold2);
      font-family: var(--font-m);
      font-size: 8px;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: all 0.12s;
      text-transform: uppercase;

      padding: 12px;
      font-size: 12px;
      line-height: 1.65;
      color: var(--text2);

      gap: 6px;
      padding: 8px 12px;

      background: var(--surface3);

      padding: 6px;
      font-family: var(--font-m);
      font-size: 9px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      border-radius: 5px;
      cursor: pointer;
      transition: all 0.12s;

    .ai-act-btn.use {
      background: var(--gold);
      border: none;
      color: var(--bg);
    }

      background: transparent;
      border: 1px solid var(--border2);
      color: var(--text2);
    }

    .ai-act-btn.edit:hover { border-color: var(--gold2); color: var(--gold); }
    .ai-act-btn:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }

    /* Sentiment widget */
    .sentiment-widget {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .sent-meter {
      flex: 1;
      height: 6px;
      background: var(--border2);
      border-radius: 3px;
      overflow: hidden;
    }

      height: 100%;
      border-radius: 3px;
      transition: width 0.5s ease;

    .sent-fill.neg { background: linear-gradient(90deg, var(--red), #ff8fa8); }

      flex-direction: column;

    }

    .seq-mini-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
    }

    .seq-mini-dot {

      border-radius: 50%;

    .seq-mini-day   { font-family: var(--font-m); font-size: 9px; color: var(--text3); }

    /* ══ EMPTY STATE ══ */
    .empty-detail {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text3);
      gap: 12px;
    }

    .empty-icon { font-size: 40px; opacity: 0.4; }
    .empty-text { font-family: var(--font-m); font-size: 12px; letter-spacing: 1px; }

    /* ══ TOAST ══ */
    .toast-container {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
    }

    .toast {
      background: var(--surface3);
      border: 1px solid var(--border2);
      border-left: 3px solid var(--green);
      border-radius: 8px;
      padding: 10px 14px;
      display: flex;
      align-items: flex-start;
      gap: 9px;
      min-width: 240px;
      max-width: 320px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.5);
      pointer-events: all;
      animation: toastIn 0.3s cubic-bezier(0.22,1,0.36,1) both;
    }

    .toast.leaving { animation: toastOut 0.25s ease forwards; }
    .toast.warn  { border-left-color: var(--amber); }
    .toast.info  { border-left-color: var(--blue); }
    .toast.error { border-left-color: var(--red); }

    @keyframes toastIn  { from { opacity:0; transform:translateX(14px); } to { opacity:1; transform:none; } }
    @keyframes toastOut { from { opacity:1; } to { opacity:0; transform:translateX(14px); } }

    .toast-ico  { font-size: 13px; flex-shrink: 0; }
    .toast-ttl  { font-size: 11px; font-weight: 600; color: var(--text); }
    .toast-msg  { font-size: 10px; color: var(--text2); margin-top: 1px; }

    /* ══ SCROLLBAR ══ */
    ::-webkit-scrollbar       { width: 3px; height: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--border3); }

    /* Typing indicator */
    .typing-dots {
      display: inline-flex;
      gap: 3px;
      align-items: center;
      padding: 10px 14px;
    }

    .typing-dots span {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--text3);
      animation: dot-bounce 1.2s ease-in-out infinite;
    }

    .typing-dots span:nth-child(2) { animation-delay: 0.15s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.30s; }

    @keyframes dot-bounce {

      30%          { transform: translateY(-5px); }
    }

    /* ══ RESPONSIVE ══ */
    @media (max-width: 1100px) {

      .detail-body { grid-template-columns: 1fr 280px; }
    }

    @media (max-width: 860px) {
      .filter-col { display: none; }
      .inbox { grid-template-columns: 280px 1fr; }
    }

/* ═══════════════════════════════════════
   STATE
═══════════════════════════════════════ */
let currentFilter = 'all';
let currentConvId = null;
let searchQuery   = '';

/* ═══════════════════════════════════════
   FILTER + RENDER CONVERSATION LIST
═══════════════════════════════════════ */
function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.remove('active');
    b.setAttribute('aria-pressed', 'false');
  });
  const btn = document.getElementById('fb-' + f);
  if (btn) {
    btn.classList.add('active');
    btn.setAttribute('aria-pressed', 'true');
  }
  renderConvList();
}

function filterConversations(q) {
  searchQuery = q.toLowerCase();
  renderConvList();
}

function toggleCampaignFilter(el, camp) {
  document.querySelectorAll('.cf-pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  renderConvList();
}

function getFilteredConvs() {
  return conversations.filter(c => {
    const matchFilter = currentFilter === 'all' || c.priority === currentFilter
      || (currentFilter === 'qualified' && c.bantScore === 4)
      || (currentFilter === 'replied')   // all have replied
      || (currentFilter === 'booked' && ['c1','c4'].includes(c.id))
      || (currentFilter === 'objection' && ['c5','c3'].includes(c.id));
    const matchSearch = !searchQuery
      || c.name.toLowerCase().includes(searchQuery)
      || c.company.toLowerCase().includes(searchQuery)
      || c.title.toLowerCase().includes(searchQuery);
    return matchFilter && matchSearch;
  });
}

const BANT_SCORE_COLORS = { 4: '#2ecc8a', 3: '#e8b84b', 2: '#ffb347', 1: '#e84b6a' };

function renderConvList() {
  const list = document.getElementById('convList');
  const convs = getFilteredConvs();

  if (!convs.length) {
    list.innerHTML = `<div style="padding:24px;text-align:center;font-family:var(--font-m);font-size:11px;color:var(--text3)">No conversations found</div>`;
    return;
  }

  list.innerHTML = convs.map(c => {
    const lastMsg = c.thread[c.thread.length - 1];
    const preview = lastMsg.text.slice(0, 64) + (lastMsg.text.length > 64 ? '…' : '');
    const sentDots = [1,2,3,4,5].map(n =>
      `<span class="sent-dot ${n <= Math.round(c.sentiment.score * 5) ? `filled ${c.sentiment.type}` : ''}"></span>`
    ).join('');
    const score = c.bantScore;
    const scoreColor = BANT_SCORE_COLORS[score] || 'var(--text3)';

    return `
      <button class="conv-card ${c.unread ? 'unread' : ''} ${c.id === currentConvId ? 'active' : ''}"
              id="card-${c.id}"
              role="listitem"
              aria-label="${c.name} from ${c.company}, ${c.priority} priority, BANT score ${score}/4"
              onclick="openConversation('${c.id}')">
        <div class="conv-top">
          <span class="conv-name">${esc(c.name)}</span>
          <span class="conv-time">${c.time}</span>
        </div>
        <div class="conv-company">${esc(c.company)} · ${esc(c.title)}</div>
        <div class="conv-preview">${esc(preview)}</div>
        <div class="conv-badges">
          <span class="badge-pill pill-${c.priority}" aria-label="Priority: ${c.priority}">
            ${c.priority === 'hot' ? '🔴' : c.priority === 'warm' ? '🟡' : '🔵'} ${c.priority.toUpperCase()}
          </span>
          <span class="badge-pill bant-mini" style="background:${scoreColor}18;color:${scoreColor};border-color:${scoreColor}40">
            BANT ${score}/4
          </span>
        </div>
        <div class="sentiment-bar">
          <span class="sent-label">SENTIMENT</span>
          <div class="sent-dots" aria-label="Sentiment: ${c.sentiment.label}">${sentDots}</div>
          <span style="font-family:var(--font-m);font-size:8px;color:var(--text3);margin-left:2px">${c.sentiment.label}</span>
        </div>
      </button>`;
  }).join('');
}

function toggleSort() {
  conversations.reverse();
  renderConvList();
}

/* ═══════════════════════════════════════
   OPEN CONVERSATION
═══════════════════════════════════════ */
function openConversation(id) {
  currentConvId = id;
  const c = conversations.find(c => c.id === id);
  if (!c) return;
  c.unread = false;

  // Update card states
  document.querySelectorAll('.conv-card').forEach(el => el.classList.remove('active'));
  document.getElementById('card-' + id)?.classList.add('active');
  renderConvList(); // re-render to update unread dots

  // Build detail pane
  const col = document.getElementById('detailCol');
  col.innerHTML = buildDetailPane(c);

  // Bind composer
  const textarea = document.getElementById('replyText');
  if (textarea) {
    textarea.addEventListener('input', () => {
      document.getElementById('charCount').textContent = textarea.value.length + ' chars';
    });
  }
}

    { key: 'B', label: 'Budget', hints: { confirmed: 'Budget confirmed', partial: 'Budget implied', unconfirmed: 'Not discussed' } },

/* ═══════════════════════════════════════
   ACTIONS
═══════════════════════════════════════ */
function setCompTab(btn, type) {
  document.querySelectorAll('.comp-tab').forEach(b => {
    b.classList.remove('active');
    b.setAttribute('aria-selected', 'false');
  });
  btn.classList.add('active');
  btn.setAttribute('aria-selected', 'true');
}

function toggleSection(section) {
  section.classList.toggle('collapsed');
  const header = section.querySelector('.rs-header');
  const expanded = !section.classList.contains('collapsed');
  header.setAttribute('aria-expanded', expanded);
}

function useAIReply(id) {
  const c = conversations.find(c => c.id === id);
  if (!c) return;
  const textarea = document.getElementById('replyText');
  if (textarea) {
    textarea.value = c.aiReply;
    document.getElementById('charCount').textContent = textarea.value.length + ' chars';
    textarea.focus();
    showToast('Draft Loaded', 'AI reply loaded into composer', 'success');
  }
}

function editAndSend(id) {
  useAIReply(id);
  document.getElementById('replyText')?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

async function regenerateReply(id) {
  const c = conversations.find(c => c.id === id);
  if (!c) return;
  const el = document.getElementById('aiReplyText-' + id);
  if (!el) return;

  el.innerHTML = `<div class="typing-dots" aria-label="Generating reply…"><span></span><span></span><span></span></div>`;

  await delay(1500);

  // Rotate alternative drafts
  const alts = [
    `${c.name.split(' ')[0]}, thanks for the context — let me make this concrete. I'll send you a 2-minute Loom walkthrough of the exact setup we'd use for ${c.company}, then we can decide if a call makes sense. That way you're not committing time until you've seen what it actually does. Does that work?`,
    `Appreciate the honest reply, ${c.name.split(' ')[0]}. The fastest thing I can do is show you a live example — I'll send over an email that Claude wrote for a company identical to ${c.company}'s profile. If it reads like a robot, I'll leave you alone. If it doesn't, it might be worth 15 minutes. Fair?`,
  ];
  const newDraft = alts[Math.floor(Math.random() * alts.length)];
  c.aiReply = newDraft;
  el.textContent = newDraft;
  showToast('Regenerated', 'New AI draft ready', 'success');
}

async function sendReply(id) {
  const textarea = document.getElementById('replyText');
  if (!textarea?.value.trim()) {
    showToast('Empty Reply', 'Write something before sending', 'warn');
    return;
  }

  const btn = document.getElementById('sendBtn');
  btn.classList.add('sending');
  btn.innerHTML = '<span class="spinner" style="width:12px;height:12px;border:2px solid rgba(0,0,0,0.2);border-top-color:var(--bg);border-radius:50%;animation:spin 0.7s linear infinite;display:inline-block"></span> Sending…';

  await delay(900);

  const c = conversations.find(c => c.id === id);
  if (c) {
    const newMsg = {
      role: 'out',
      sender: 'Alex (Soldiro)',
      time: 'Just now',
      ai: false,
      text: textarea.value,
    };
    c.thread.push(newMsg);
    c.time = 'Just now';
  }

  textarea.value = '';
  document.getElementById('charCount').textContent = '0 chars';
  btn.classList.remove('sending');
  btn.innerHTML = '<span aria-hidden="true">↑</span> Send';

  // Re-render thread
  const threadScroll = document.getElementById('threadScroll');
  if (threadScroll && c) {
    const msgWrap = document.createElement('div');
    msgWrap.className = 'msg-wrap outbound';
    msgWrap.innerHTML = `
      <div class="msg-avatar" style="background:var(--surface4);color:var(--text3)">AI</div>
      <div>
        <div class="msg-header">
          <span class="msg-name">ALEX (SOLDIRO)</span>
          <span class="msg-time">Just now</span>
        </div>
        <div class="msg-bubble">${esc(textarea.value || c.thread[c.thread.length-1].text)}</div>
        <div class="msg-sent-status">✓ Sent</div>
      </div>`;
    threadScroll.appendChild(msgWrap);
    threadScroll.scrollTop = threadScroll.scrollHeight;
  }

  renderConvList();
  showToast('Reply Sent', `Message delivered to ${c?.name}`, 'success');
}

async function bookMeeting(name) {
  showToast('Booking Meeting', `Sending Calendly link to ${name}…`, 'info');
  await delay(1000);
  showToast('Meeting Link Sent', `${name} received your calendar link`, 'success');
}

function archiveConv(id) {
  const idx = conversations.findIndex(c => c.id === id);
  if (idx !== -1) {
    conversations.splice(idx, 1);
    currentConvId = null;
    document.getElementById('detailCol').innerHTML = `
      <div class="empty-detail">
        <div class="empty-icon" aria-hidden="true">✅</div>
        <div class="empty-text">CONVERSATION ARCHIVED</div>
      </div>`;
    renderConvList();
    showToast('Archived', 'Conversation moved to archive', 'success');
  }
}

function markSpam(id) {
  archiveConv(id);
  showToast('Marked as Spam', 'This sender will be suppressed', 'warn');
}

/* ═══════════════════════════════════════
   TOAST
═══════════════════════════════════════ */
const TOAST_ICONS = { success: '✅', info: 'ℹ️', warn: '⚠️', error: '❌' };

function showToast(title, message, type = 'success') {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;

  const ico = document.createElement('div');
  ico.className = 'toast-ico';
  ico.setAttribute('aria-hidden', 'true');
  ico.textContent = TOAST_ICONS[type] || '●';

  const body = document.createElement('div');
  const t = document.createElement('div'); t.className = 'toast-ttl'; t.textContent = title;
  const m = document.createElement('div'); m.className = 'toast-msg'; m.textContent = message;
  body.append(t, m);
  toast.append(ico, body);
  container.appendChild(toast);

  setTimeout(() => {
    toast.classList.add('leaving');
    toast.addEventListener('animationend', () => toast.remove(), { once: true });
  }, 3200);
}

/* ═══════════════════════════════════════
   UTILS
═══════════════════════════════════════ */
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

/* ═══════════════════════════════════════
   KEYBOARD
═══════════════════════════════════════ */
document.addEventListener('keydown', e => {
  // j/k to move between conversations
  if ((e.key === 'j' || e.key === 'k') && !['INPUT','TEXTAREA'].includes(document.activeElement.tagName)) {
    const convs = getFilteredConvs();
    const idx = convs.findIndex(c => c.id === currentConvId);
    const next = e.key === 'j' ? Math.min(convs.length - 1, idx + 1) : Math.max(0, idx - 1);
    if (convs[next]) openConversation(convs[next].id);
    e.preventDefault();
  }
  // r = reply
  if (e.key === 'r' && !['INPUT','TEXTAREA'].includes(document.activeElement.tagName) && currentConvId) {
    document.getElementById('replyText')?.focus();
    e.preventDefault();
  }
  // b = book meeting
  if (e.key === 'b' && !['INPUT','TEXTAREA'].includes(document.activeElement.tagName) && currentConvId) {
    const c = conversations.find(c => c.id === currentConvId);
    if (c) bookMeeting(c.name);
    e.preventDefault();
  }
});

/* ═══════════════════════════════════════
   INIT
═══════════════════════════════════════ */
renderConvList();
// Auto-open first conversation
setTimeout(() => openConversation(conversations[0].id), 50);
</script>
